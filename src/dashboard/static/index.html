<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Urban Detection Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="blob left-blob"></div>
    <div class="blob right-blob"></div>

    <div class="dashboard">
        <header class="glass-header">
            <h1>Urban Detection Live</h1>
            <div class="status">
                <span class="dot"></span>
                <span>System Active</span>
            </div>
        </header>

        <main>
            <div class="video-container glass-card">
                <img id="video-stream" src="/video_feed" alt="Video Feed">
                <div id="video-overlay">Scanning...</div>
            </div>

            <aside class="sidebar">
                <div class="glass-card stat-card">
                    <h3>Performance</h3>
                    <div class="fps-meter">
                        <span id="fps-val">--</span>
                        <span class="label">FPS</span>
                    </div>
                </div>

                <div class="glass-card control-card">
                    <h3>Detection Control</h3>
                    <div class="control-group">
                        <label for="conf-slider">Confidence Threshold: <span id="conf-val">0.30</span></label>
                        <input type="range" id="conf-slider" min="0" max="1" step="0.05" value="0.30">
                    </div>
                </div>

                <div class="glass-card source-card">
                    <h3>Video Source</h3>
                    <div class="control-group">
                        <select id="source-select">
                            <option value="output.mp4">Sample Data (output.mp4)</option>
                            <option value="0">Webcam (Source 0)</option>
                        </select>
                        <button id="switch-source-btn" class="glass-btn">Switch Stream</button>
                    </div>
                    <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
                    <div class="upload-group">
                        <label for="video-upload" class="glass-btn" style="display:block; text-align:center;">Upload Custom Video</label>
                        <input type="file" id="video-upload" accept="video/mp4,video/x-m4v,video/*" style="display: none;">
                        <div id="upload-status" style="font-size: 0.8rem; margin-top: 8px; color: var(--text-secondary); text-align: center;"></div>
                    </div>
                </div>

                <div class="glass-card stats-card">
                    <h3>Live Detections</h3>
                    <ul id="detections-list">
                        <!-- Dynamic content -->
                    </ul>
                </div>
            </aside>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
